# ============================================================
# FF-Partner Bridge — Azure DevOps CI/CD Pipeline
# F0-07: Build → Test → Docker Push → Deploy on-premise
#
# Trigger:
#   - Push na 'main' → produkční deploy (registry.cendelin.eu)
#   - Push na 'develop' → pouze build + test (žádný deploy)
#   - Pull Request → build + test (žádný deploy)
#
# Prerekvizity (nastavit v Azure DevOps Library):
#   - Variable Group 'bridge-prod-secrets':
#     REGISTRY_USERNAME, REGISTRY_PASSWORD — přihlášení do registry.cendelin.eu
#     DEPLOY_HOST — hostname/IP on-premise serveru (SSH), formát: hostname nebo IPv4
#     BRIDGE_HEALTH_URL — health check URL (default http://localhost:8080/health)
#   - Secure Files v Azure DevOps Library:
#     bridge_deploy_ssh_key — privátní SSH klíč pro deploy user
#     bridge_deploy_known_hosts — known_hosts soubor (fingerprint serveru)
#       Získat pomocí: ssh-keyscan <DEPLOY_HOST> > known_hosts
#
# DŮLEŽITÉ: Environment 'production' musí být ručně vytvořen v Azure DevOps
#   Environments > production > Approvals and checks PŘED prvním spuštěním!
#   Bez manuálního nastavení se environment vytvoří bez approval gates.
# ============================================================

trigger:
  branches:
    include:
      - main
      - develop

pr:
  branches:
    include:
      - main
      - develop

variables:
  DOCKER_IMAGE: registry.cendelin.eu/ff-partner-bridge
  DOTNET_VERSION: '8.0.x'
  BUILD_CONFIGURATION: Release

stages:

# ──────────────────────────────────────────────────────────────
# Stage 1: Build + Test
# Spustí se pro každý push a každý PR.
# ──────────────────────────────────────────────────────────────

- stage: BuildAndTest
  displayName: 'Build + Test'
  jobs:
  - job: BuildTest
    displayName: 'dotnet build + test'
    pool:
      vmImage: 'ubuntu-22.04'

    steps:
    - task: UseDotNet@2
      displayName: 'Install .NET $(DOTNET_VERSION)'
      inputs:
        version: $(DOTNET_VERSION)
        includePreviewVersions: false

    - task: DotNetCoreCLI@2
      displayName: 'dotnet restore'
      inputs:
        command: restore
        projects: '**/*.csproj'

    - task: DotNetCoreCLI@2
      displayName: 'dotnet build'
      inputs:
        command: build
        projects: 'src/**/*.csproj'
        arguments: '--configuration $(BUILD_CONFIGURATION) --no-restore'

    - task: DotNetCoreCLI@2
      displayName: 'dotnet test'
      inputs:
        command: test
        projects: 'tests/**/*.csproj'
        arguments: '--configuration $(BUILD_CONFIGURATION) --no-restore --logger trx --results-directory $(Agent.TempDirectory)/TestResults'
        publishTestResults: false

    - task: PublishTestResults@2
      displayName: 'Publish test results'
      condition: always()
      inputs:
        testResultsFormat: VSTest
        testResultsFiles: '$(Agent.TempDirectory)/TestResults/**/*.trx'
        failTaskOnFailedTests: true

# ──────────────────────────────────────────────────────────────
# Stage 2: Docker Build + Push
# Spustí se POUZE pro push na 'main'.
# ──────────────────────────────────────────────────────────────

- stage: DockerPush
  displayName: 'Docker Build + Push'
  dependsOn: BuildAndTest
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))

  variables:
  - group: bridge-prod-secrets

  jobs:
  - job: DockerBuildPush
    displayName: 'Build Docker image + push to registry'
    pool:
      vmImage: 'ubuntu-22.04'

    steps:
    - bash: |
        set +x  # Zajistit, že heslo se nezobrazí v logu ani při debug
        echo "$(REGISTRY_PASSWORD)" | docker login registry.cendelin.eu \
          --username "$(REGISTRY_USERNAME)" --password-stdin
      displayName: 'Docker login — registry.cendelin.eu'
      env:
        REGISTRY_USERNAME: $(REGISTRY_USERNAME)
        REGISTRY_PASSWORD: $(REGISTRY_PASSWORD)

    - bash: |
        IMAGE_TAG="$(Build.BuildId)"
        docker build \
          --tag "$(DOCKER_IMAGE):${IMAGE_TAG}" \
          --label "git-commit=$(Build.SourceVersion)" \
          --label "build-id=$(Build.BuildId)" \
          .
        # Tagujeme POUZE BuildId — :latest nepoužíváme (non-deterministické deploye)
        echo "##vso[task.setvariable variable=IMAGE_TAG;isOutput=true]${IMAGE_TAG}"
      displayName: 'Docker build'
      name: dockerBuild

    - bash: |
        IMAGE_TAG="$(Build.BuildId)"
        docker push "$(DOCKER_IMAGE):${IMAGE_TAG}"
      displayName: 'Docker push'

# ──────────────────────────────────────────────────────────────
# Stage 3: Deploy on-premise
# SSH pull + docker-compose restart na serveru XTuning.
# Spustí se POUZE po úspěšném Docker Push.
#
# POŽADAVEK: Environment 'production' musí mít nastavené approval gates
#   v Azure DevOps UI (Environments > production > Approvals and checks).
# ──────────────────────────────────────────────────────────────

- stage: DeployProd
  displayName: 'Deploy on-premise (XTuning)'
  dependsOn: DockerPush
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))

  variables:
  - group: bridge-prod-secrets

  jobs:
  - deployment: DeployToOnPrem
    displayName: 'Pull + restart Bridge on XTuning server'
    pool:
      vmImage: 'ubuntu-22.04'
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: DownloadSecureFile@1
            name: sshKey
            displayName: 'Download SSH key'
            inputs:
              secureFile: 'bridge_deploy_ssh_key'

          - task: DownloadSecureFile@1
            name: knownHosts
            displayName: 'Download known_hosts (SSH fingerprint)'
            inputs:
              secureFile: 'bridge_deploy_known_hosts'

          - bash: |
              chmod 600 "$(sshKey.secureFilePath)"

              # Validace formátu DEPLOY_HOST — pouze hostname nebo IPv4 (prevence command injection)
              DEPLOY_HOST="$(DEPLOY_HOST)"
              if [[ ! "$DEPLOY_HOST" =~ ^[a-zA-Z0-9._-]+$ ]]; then
                echo "##vso[task.logissue type=error]DEPLOY_HOST obsahuje neplatné znaky: $DEPLOY_HOST"
                exit 1
              fi

              IMAGE_TAG="$(Build.BuildId)"

              ssh -i "$(sshKey.secureFilePath)" \
                -o UserKnownHostsFile="$(knownHosts.secureFilePath)" \
                -o StrictHostKeyChecking=yes \
                "deploy@${DEPLOY_HOST}" \
                "cd /opt/ff-partner-bridge && \
                 docker pull registry.cendelin.eu/ff-partner-bridge:${IMAGE_TAG} && \
                 IMAGE_TAG=${IMAGE_TAG} docker compose up -d --no-build ff-partner-bridge && \
                 echo 'Deploy dokoncen:' \$(date -u)"
            displayName: 'SSH deploy — pull + restart'
            env:
              DEPLOY_HOST: $(DEPLOY_HOST)

          - bash: |
              chmod 600 "$(sshKey.secureFilePath)"

              DEPLOY_HOST="$(DEPLOY_HOST)"
              HEALTH_URL="${BRIDGE_HEALTH_URL:-http://localhost:8080/health}"

              # Retry loop — 10 pokusů, každých 5s (max 50s čekání)
              for i in $(seq 1 10); do
                echo "Health check pokus $i/10..."
                if ssh -i "$(sshKey.secureFilePath)" \
                     -o UserKnownHostsFile="$(knownHosts.secureFilePath)" \
                     -o StrictHostKeyChecking=yes \
                     "deploy@${DEPLOY_HOST}" \
                     "curl --silent --fail '${HEALTH_URL}' | grep -q 'healthy'"; then
                  echo "Bridge je zdravý!"
                  exit 0
                fi
                sleep 5
              done

              echo "##vso[task.logissue type=error]Bridge health check selhal po 50 sekundách"
              exit 1
            displayName: 'Post-deploy health check (retry)'
            env:
              DEPLOY_HOST: $(DEPLOY_HOST)
              BRIDGE_HEALTH_URL: $(BRIDGE_HEALTH_URL)
