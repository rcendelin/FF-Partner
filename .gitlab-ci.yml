# .gitlab-ci.yml — FF-Partner Bridge
# Ekvivalent .github/workflows/bridge.yml pro GitLab CI/CD
#
# Vyžadované CI/CD variables (nastavit v GitLab → Settings → CI/CD → Variables):
#   REGISTRY_USERNAME   — uživatel pro registry.cendelin.eu                    (masked)
#   REGISTRY_PASSWORD   — heslo pro registry.cendelin.eu                       (masked)
#   DEPLOY_SSH_KEY      — privátní SSH klíč pro přístup na deploy host          (masked, multiline)
#   DEPLOY_KNOWN_HOSTS  — výstup ssh-keyscan na deploy hostu                   (masked)
#   DEPLOY_HOST         — hostname nebo IP deploy serveru (jen [a-zA-Z0-9._-])  (masked)
#   BRIDGE_HEALTH_URL   — URL health checku (výchozí: http://localhost:8080/health) (volitelné)

stages:
  - build
  - docker
  - deploy

variables:
  DOCKER_IMAGE: registry.cendelin.eu/ff-partner-bridge
  DOTNET_VERSION: "8.0"
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  # NuGet balíčky v rámci projektu — sdíleny přes cache
  NUGET_PACKAGES: "$CI_PROJECT_DIR/.nuget/packages"

# ── Stage 1: Build + Test ─────────────────────────────────────────────────────

build-and-test:
  stage: build
  image: mcr.microsoft.com/dotnet/sdk:8.0
  cache:
    key:
      files:
        - "**/*.csproj"
      prefix: nuget
    paths:
      - .nuget/packages/
    policy: pull-push
  script:
    - dotnet restore --packages "$NUGET_PACKAGES"
    - dotnet build --configuration Release --no-restore
    - >
      dotnet test
      --configuration Release
      --no-restore
      --logger trx
      --results-directory "$CI_PROJECT_DIR/TestResults"
  artifacts:
    when: always
    name: "test-results-$CI_PIPELINE_IID"
    paths:
      - TestResults/**/*.trx
    expire_in: 30 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'

# ── Stage 2: Docker Build + Push ─────────────────────────────────────────────

docker-push:
  stage: docker
  # POZOR: vyžaduje GitLab runner s `privileged = true` v config.toml (Docker-in-Docker)
  image: docker:27
  services:
    - name: docker:27-dind
      alias: docker
  needs:
    - job: build-and-test
      artifacts: false
  variables:
    IMAGE_TAG: "$CI_PIPELINE_IID"
  before_script:
    - echo "$REGISTRY_PASSWORD"
      | docker login registry.cendelin.eu
        --username "$REGISTRY_USERNAME"
        --password-stdin
  script:
    - >
      docker build
      --tag "$DOCKER_IMAGE:$IMAGE_TAG"
      --label "git-commit=$CI_COMMIT_SHA"
      --label "build-id=$CI_PIPELINE_IID"
      .
    - docker push "$DOCKER_IMAGE:$IMAGE_TAG"
  after_script:
    - docker logout registry.cendelin.eu || true
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"'

# ── Stage 3: Deploy on-premise (XTuning) ─────────────────────────────────────

deploy-production:
  stage: deploy
  image: alpine:3.20
  needs:
    - job: docker-push
      artifacts: false
  environment:
    name: production
    url: http://bridge.xtuning.internal:8080/health
  variables:
    IMAGE_TAG: "$CI_PIPELINE_IID"
    GIT_STRATEGY: none    # žádný checkout — pouze SSH deploy
  before_script:
    - apk add --no-cache openssh-client curl
    - mkdir -p ~/.ssh
    - printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
    - chmod 600 ~/.ssh/deploy_key
    - printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
    # Validace DEPLOY_HOST — zabraňuje command injection
    - |
      if ! printf '%s' "$DEPLOY_HOST" | grep -qE '^[a-zA-Z0-9._-]+$'; then
        echo "ERROR: DEPLOY_HOST obsahuje neplatné znaky: $DEPLOY_HOST"
        exit 1
      fi
  script:
    - |
      ssh \
        -i ~/.ssh/deploy_key \
        -o UserKnownHostsFile=~/.ssh/known_hosts \
        -o StrictHostKeyChecking=yes \
        "deploy@${DEPLOY_HOST}" \
        "cd /opt/ff-partner-bridge \
          && docker pull registry.cendelin.eu/ff-partner-bridge:${IMAGE_TAG} \
          && IMAGE_TAG=${IMAGE_TAG} docker compose up -d --no-build ff-partner-bridge \
          && echo 'Deploy dokoncen:' \$(date -u)"
    # Health check přes SSH — Bridge naslouchá pouze na interní síti XTuning
    - |
      HEALTH_URL="${BRIDGE_HEALTH_URL:-http://localhost:8080/health}"
      for i in $(seq 1 10); do
        echo "Health check pokus $i/10..."
        if ssh \
            -i ~/.ssh/deploy_key \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            -o StrictHostKeyChecking=yes \
            "deploy@${DEPLOY_HOST}" \
            "curl --silent --fail '${HEALTH_URL}' | grep -q 'healthy'"; then
          echo "Bridge je zdravý!"
          exit 0
        fi
        sleep 5
      done
      echo "ERROR: Bridge health check selhal po 50 sekundách"
      exit 1
  after_script:
    - rm -f ~/.ssh/deploy_key ~/.ssh/known_hosts
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"'
      when: manual    # vyžaduje manuální spuštění v GitLab UI před nasazením
