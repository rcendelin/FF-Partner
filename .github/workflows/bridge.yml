# GitHub Actions — kanonický CI/CD pipeline pro FF-Partner Bridge.
#
# Tři stages:
#   1. build-and-test  (vždy: PR + push na main/develop)
#   2. docker-push     (auto na main: build + push do Azure Container Registry přes OIDC)
#   3. deploy          (Environment 'production' approval: SSH na on-prem XTuning)
#
# GitLab repo (git.xtuning.cz/fieldforce/partner-bridge) je read-only mirror,
# žádný runner. Detaily viz docs/GITHUB-CICD.md.
#
# Auth model:
#   - ACR push: OIDC federated identity (Entra ID App Registration). Žádné
#     dlouhodobé secrets — pouze CLIENT_ID/TENANT_ID/SUBSCRIPTION_ID jako repo secrets.
#   - SSH deploy: SSH klíč v repo secrets (DEPLOY_SSH_KEY).
#   - Deploy server pull z ACR: token uložený lokálně (viz infra/F0-09-deploy-token-setup.sh).
name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Defaultní permissions — vědomě restriktivní
permissions:
  contents: read

env:
  # ACR_NAME a ACR_LOGIN_SERVER musí odpovídat hodnotám z infra/F0-09-acr-setup.sh.
  # Aktualizovat ZÁROVEŇ s docker-compose.yml na deploy serveru.
  ACR_NAME: crffpartnerbridge
  ACR_LOGIN_SERVER: crffpartnerbridge.azurecr.io
  IMAGE_REPO: ff-partner-bridge
  # Solution používá .slnx formát — vyžaduje SDK 9.0.200+. TFM zůstává net8.0.
  DOTNET_VERSION: '9.0.x'

jobs:
  build-and-test:
    name: Build + Test
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # Cacheujeme NuGet balíčky — klíč se mění při změně .csproj souborů
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build --configuration Release --no-restore

      - name: Run tests
        run: >
          dotnet test
          --configuration Release
          --no-restore
          --logger trx
          --results-directory "${{ runner.temp }}/TestResults"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.run_number }}
          path: ${{ runner.temp }}/TestResults/**/*.trx
          if-no-files-found: warn

  docker-push:
    name: Docker Build + Push
    runs-on: ubuntu-22.04
    needs: build-and-test
    # Spustit pouze na push do main — ne na PR ani develop
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    # OIDC token request vyžaduje id-token: write.
    # Override defaultního permissions pro tento job.
    permissions:
      contents: read
      id-token: write

    outputs:
      image-tag: ${{ steps.build.outputs.image-tag }}

    steps:
      - uses: actions/checkout@v4

      # Federated identity (žádné AZURE_CLIENT_SECRET) — viz infra/F0-09-github-oidc-setup.sh
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name "${{ env.ACR_NAME }}"

      - name: Docker build & push
        id: build
        run: |
          # Používáme run_number (sekvenční) místo run_id (globální velké číslo)
          IMAGE_TAG="${{ github.run_number }}"
          IMAGE_FULL="${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_REPO }}:${IMAGE_TAG}"
          docker build \
            --tag "${IMAGE_FULL}" \
            --label "git-commit=${{ github.sha }}" \
            --label "build-id=${{ github.run_number }}" \
            .
          docker push "${IMAGE_FULL}"
          echo "image-tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy on-premise (XTuning)
    runs-on: ubuntu-22.04
    needs: docker-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # GitHub Environment 'production' = required reviewers + audit log
    environment: production

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          # Zapisujeme klíč ze secrets — nikdy nelogovat obsah
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # known_hosts ze secrets (výstup ssh-keyscan na deploy hostu)
          echo "${{ secrets.DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: SSH deploy
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          IMAGE_TAG: ${{ needs.docker-push.outputs.image-tag }}
        run: |
          # Bezpečnostní validace: DEPLOY_HOST nesmí obsahovat speciální znaky
          # Zabraňuje command injection v případě kompromitace secrets
          if [[ ! "$DEPLOY_HOST" =~ ^[a-zA-Z0-9._-]+$ ]]; then
            echo "::error::DEPLOY_HOST obsahuje neplatné znaky: $DEPLOY_HOST"
            exit 1
          fi

          # Deploy server musí mít předem nakonfigurovaný `docker login` do ACR
          # (viz infra/F0-09-deploy-token-setup.sh).
          ssh \
            -i ~/.ssh/deploy_key \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            -o StrictHostKeyChecking=yes \
            "deploy@${DEPLOY_HOST}" \
            "cd /opt/ff-partner-bridge \
              && docker pull ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_REPO }}:${IMAGE_TAG} \
              && IMAGE_TAG=${IMAGE_TAG} docker compose up -d --no-build ff-partner-bridge \
              && echo 'Deploy dokoncen:' \$(date -u)"

      - name: Health check
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          BRIDGE_HEALTH_URL: ${{ secrets.BRIDGE_HEALTH_URL }}
        run: |
          if [[ ! "$DEPLOY_HOST" =~ ^[a-zA-Z0-9._-]+$ ]]; then
            echo "::error::DEPLOY_HOST obsahuje neplatné znaky"
            exit 1
          fi

          # Health check přes SSH — Bridge naslouchá pouze na interní síti XTuning
          HEALTH_URL="${BRIDGE_HEALTH_URL:-http://localhost:8080/health}"
          for i in $(seq 1 10); do
            echo "Health check pokus $i/10..."
            if ssh \
                -i ~/.ssh/deploy_key \
                -o UserKnownHostsFile=~/.ssh/known_hosts \
                -o StrictHostKeyChecking=yes \
                "deploy@${DEPLOY_HOST}" \
                "curl --silent --fail '${HEALTH_URL}' | grep -q 'healthy'"; then
              echo "Bridge je zdravý!"
              exit 0
            fi
            sleep 5
          done

          echo "::error::Bridge health check selhal po 50 sekundách"
          exit 1

      # SSH klíč vždy smazat — i při selhání předchozích kroků
      - name: Cleanup SSH keys
        if: always()
        run: rm -f ~/.ssh/deploy_key ~/.ssh/known_hosts
