# GitHub Actions — kanonický CI/CD pipeline pro FF-Partner Bridge.
#
# Dva stages:
#   1. build-and-test  (vždy: PR + push na main/develop)
#   2. acr-push        (auto na main: build + push do Azure Container Registry)
#
# Deploy na on-premise XTuning se provádí ručně (viz docs/AZURE-ACR-SETUP.md).
# GitLab repo (git.xtuning.cz/fieldforce/partner-bridge) je read-only mirror,
# žádný runner. Detaily viz docs/GITHUB-CICD.md.
name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  IMAGE_NAME: ff-partner-bridge
  # Solution používá .slnx formát — vyžaduje SDK 9.0.200+. TFM zůstává net8.0.
  DOTNET_VERSION: '9.0.x'

jobs:
  build-and-test:
    name: Build + Test
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # Cacheujeme NuGet balíčky — klíč se mění při změně .csproj souborů
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build --configuration Release --no-restore

      - name: Run tests
        run: >
          dotnet test
          --configuration Release
          --no-restore
          --logger trx
          --results-directory "${{ runner.temp }}/TestResults"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.run_number }}
          path: ${{ runner.temp }}/TestResults/**/*.trx
          if-no-files-found: warn

  acr-push:
    name: Build + Push to Azure ACR
    runs-on: ubuntu-22.04
    needs: build-and-test
    # Spustit pouze na push do main — ne na PR ani develop
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    outputs:
      image-tag: ${{ steps.build.outputs.image-tag }}
      acr-registry: ${{ steps.build.outputs.acr-registry }}

    steps:
      - uses: actions/checkout@v4

      # Service Principal login — vyžaduje GitHub Secret AZURE_CREDENTIALS s JSON:
      # {
      #   "clientId":       "<AZURE_CLIENT_ID>",
      #   "clientSecret":   "<AZURE_CLIENT_SECRET>",
      #   "tenantId":       "<AZURE_TENANT_ID>",
      #   "subscriptionId": "<AZURE_SUBSCRIPTION_ID>"
      # }
      # Vygeneruj přes Azure Portal (návod: docs/AZURE-ACR-SETUP.md)
      # nebo příkazem:
      #   az ad sp create-for-rbac \
      #     --name "ff-partner-bridge-ci" \
      #     --role AcrPush \
      #     --scopes "/subscriptions/<sub-id>/resourceGroups/<rg>/providers/Microsoft.ContainerRegistry/registries/<acr>" \
      #     --sdk-auth
      - name: Azure login (Service Principal)
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ACR login přes Azure CLI — využívá kontext z azure/login.
      # ACR_NAME je samotný název registru bez .azurecr.io přípony (např. "acrxtuningprod").
      - name: ACR login
        env:
          ACR_NAME: ${{ secrets.ACR_NAME }}
        run: |
          if [[ ! "$ACR_NAME" =~ ^[a-zA-Z0-9]+$ ]]; then
            echo "::error::ACR_NAME má neplatný formát (povoleno pouze [a-zA-Z0-9]): $ACR_NAME"
            exit 1
          fi
          az acr login --name "$ACR_NAME"

      - name: Docker build
        id: build
        env:
          ACR_NAME: ${{ secrets.ACR_NAME }}
        run: |
          # Používáme run_number (sekvenční) místo run_id (globální velké číslo)
          IMAGE_TAG="${{ github.run_number }}"
          ACR_REGISTRY="${ACR_NAME}.azurecr.io"
          IMAGE_REF="${ACR_REGISTRY}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}"

          docker build \
            --tag "${IMAGE_REF}" \
            --label "git-commit=${{ github.sha }}" \
            --label "build-id=${{ github.run_number }}" \
            .

          echo "image-tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "acr-registry=${ACR_REGISTRY}" >> "$GITHUB_OUTPUT"

      - name: Docker push
        run: |
          docker push "${{ steps.build.outputs.acr-registry }}/${{ env.IMAGE_NAME }}:${{ steps.build.outputs.image-tag }}"

      - name: Image summary
        run: |
          {
            echo "### Image pushed"
            echo ""
            echo "- Registry: \`${{ steps.build.outputs.acr-registry }}\`"
            echo "- Image: \`${{ env.IMAGE_NAME }}\`"
            echo "- Tag: \`${{ steps.build.outputs.image-tag }}\`"
            echo "- Commit: \`${{ github.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Azure logout
        if: always()
        run: az logout || true
