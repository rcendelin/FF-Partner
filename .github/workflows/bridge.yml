# GitHub Actions — pouze build + test pro validaci PR a smoke check na main.
#
# Kanonický CI/CD běží v GitLabu (.gitlab-ci.yml + docs/GITLAB-CICD.md):
#   build → docker-push → deploy (manual gate na on-prem XTuning).
#
# GitHub repozitář je pouze mirror pro public visibility — neobsahuje
# REGISTRY_*, DEPLOY_* secrets a nemá runner s přístupem na deploy server.
# Proto zde žádný docker-push ani deploy job neběží.
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  # Solution používá .slnx formát — vyžaduje SDK 9.0.200+. TFM zůstává net8.0.
  DOTNET_VERSION: '9.0.x'

jobs:
  build-and-test:
    name: Build + Test
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # Cacheujeme NuGet balíčky — klíč se mění při změně .csproj souborů
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build --configuration Release --no-restore

      - name: Run tests
        run: >
          dotnet test
          --configuration Release
          --no-restore
          --logger trx
          --results-directory "${{ runner.temp }}/TestResults"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.run_number }}
          path: ${{ runner.temp }}/TestResults/**/*.trx
          if-no-files-found: warn
