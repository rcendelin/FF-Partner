services:
  ff-partner-bridge:
    # Image v Azure Container Registry — push z GitHub Actions přes Service Principal.
    # ACR_NAME je samotný název registru (bez .azurecr.io); IMAGE_TAG je sekvenční
    # číslo pipeline (github.run_number). Lokálně bez proměnné se použije :latest.
    image: ${ACR_NAME}.azurecr.io/ff-partner-bridge:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    # Hostname kontejneru — propaguje se do Application Insights jako cloud_RoleInstance
    # (přes Environment.MachineName). Bez explicitního hostname Docker přiřadí krátké
    # container ID (mění se při recreate) → AI dashboards by neuměly rozlišit TEST/PROD.
    # PROD .env: BRIDGE_HOSTNAME=ff-partner-bridge-prod
    # TEST .env: BRIDGE_HOSTNAME=ff-partner-bridge-test
    hostname: ${BRIDGE_HOSTNAME:-ff-partner-bridge}
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      # App Insights connection string — write-only telemetrický endpoint, low-sensitivity.
      # Hodnotu nastav v ./.env (mode 600) jako ApplicationInsights__ConnectionString=...
      # Prázdná hodnota = telemetrie vypnutá (Bridge použije NullBridgeMetrics).
      - ApplicationInsights__ConnectionString=${ApplicationInsights__ConnectionString:-}
      # === Per-env runtime config — propaguje hodnoty z ./.env do kontejneru ===
      # Compose `.env` slouží JEN pro interpolaci ${...} v tomto souboru;
      # pro propagaci do kontejneru musí být klíč explicitně v environment: bloku.
      # Default `bridge-main` u SubscriptionName brání propagaci prázdného stringu,
      # který v .NET configuration NEPADÁ na C# `?? "bridge-main"` fallback
      # (empty string ≠ null) → Bridge by se snažil subscribe na entitu bez jména.
      - Bridge__Polling__BackfillEnabled=${Bridge__Polling__BackfillEnabled:-true}
      - OwnerMapping__DefaultOwnerId=${OwnerMapping__DefaultOwnerId:-}
      - ServiceBus__SubscriptionName=${ServiceBus__SubscriptionName:-bridge-main}
    ports:
      # Bind IP je parametrizovaná přes ./.env — typicky host IP v XTuning subnetu
      # (např. BIND_IP=172.24.0.66). Default 127.0.0.1 = pouze localhost; nikdy 0.0.0.0
      # (CLAUDE.md sek. 17). Host IP zjistíš: ip -br addr show | awk '$3 ~ /^172\.24/ {print $3}'.
      - "${BIND_IP:-127.0.0.1}:8080:8080"
    secrets:
      - azure_sql_conn
      - gaia_conn
      - partner_cz_conn
      - partner_pl_conn
      - partner_hu_conn
      - partner_us_conn
      - servicebus_conn
      - bridge_admin_api_key
      - fieldforce_db_conn
    healthcheck:
      test: ["CMD", "curl", "--silent", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

secrets:
  azure_sql_conn:
    file: ./secrets/azure_sql_conn.txt
  gaia_conn:
    file: ./secrets/gaia_conn.txt
  partner_cz_conn:
    file: ./secrets/partner_cz_conn.txt
  partner_pl_conn:
    file: ./secrets/partner_pl_conn.txt
  partner_hu_conn:
    file: ./secrets/partner_hu_conn.txt
  partner_us_conn:
    file: ./secrets/partner_us_conn.txt
  servicebus_conn:
    file: ./secrets/servicebus_conn.txt
  bridge_admin_api_key:
    file: ./secrets/bridge_admin_api_key.txt
  fieldforce_db_conn:
    file: ./secrets/fieldforce_db_conn.txt
